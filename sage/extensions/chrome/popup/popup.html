<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sage Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="logo">Sage Bridge</span>
      <span id="status-badge" class="badge badge--checking">Checking…</span>
    </header>

    <section class="info">
      <div class="stat">
        <span class="stat__label">Memories synced</span>
        <span id="memory-count" class="stat__value">—</span>
      </div>
      <div class="stat">
        <span class="stat__label">Behaviors recorded</span>
        <span id="behavior-count" class="stat__value">—</span>
      </div>
    </section>

    <button id="sync-btn" class="btn" disabled>Sync Now</button>

    <!-- Teams 配置区域 -->
    <section class="teams-section">
      <div class="section-header">
        <span class="section-title">Microsoft Teams</span>
        <span id="teams-status-badge" class="badge badge--checking">未检测到</span>
      </div>

      <div class="stat">
        <span class="stat__label">今日消息数</span>
        <span id="teams-message-count" class="stat__value">0</span>
      </div>

      <div class="setting-row">
        <label for="teams-capture-level" class="setting-label">捕获级别</label>
        <select id="teams-capture-level" class="setting-select">
          <option value="metadata">仅元数据</option>
          <option value="summary">元数据 + 摘要</option>
        </select>
      </div>
    </section>

    <footer>
      <span id="last-sync">Last sync: never</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
