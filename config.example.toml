# Sage 配置文件示例
# 复制为 ~/.sage/config.toml 并按需修改

[daemon]
heartbeat_interval_secs = 1800  # 30 minutes
log_level = "info"

[agent]
provider = "claude"  # fallback CLI: "claude" | "codex" | "gemini" | "cursor"
default_model = "sonnet"
max_budget_usd = 0.50
permission_mode = "bypassPermissions"

[channels.email]
enabled = true
poll_interval_secs = 300

[channels.calendar]
enabled = true
poll_interval_secs = 900

[channels.wechat]
enabled = false

[channels.hooks]
enabled = true
watch_dir = "~/.claude"

# ─── 认知管线（可选，缺失时用默认值） ───────────────────────

# 晚间管线：Evening Review 后依次执行
# pipeline.evening = ["observer", "coach", "mirror", "questioner", "evolution", "person_observer", "calibrator"]

# 周报管线：Weekly Report 后执行
# pipeline.weekly = ["strategist", "mirror_weekly"]

# Per-stage 配置覆盖（独立 LLM 调用预算）
# [pipeline.stages.evolution]
# max_iterations = 30
#
# [pipeline.stages.observer]
# max_iterations = 5
